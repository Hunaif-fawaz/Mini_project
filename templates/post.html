<link rel="stylesheet" href="/static/style.css">

<div class="glass">

<h2>{{post["title"]}}</h2>

<p>{{post["content"]}}</p>

<p>By {{post["username"]}}</p>

{% if post["image"] %}

<img src="/static/uploads/{{post['image']}}" width="300">

{% endif %}

<hr>

<h3>Comments</h3>

{% for c in comments %}

<p><b>{{c["username"]}}</b>: {{c["comment"]}}</p>

{% endfor %}

<form method="POST">

<input name="comment" placeholder="Write comment">

<button>Add</button>

</form>

</div>
