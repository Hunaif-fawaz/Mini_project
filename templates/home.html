<link rel="stylesheet" href="/static/style.css">

<div class="navbar">

<h2>Student Forum</h2>

<div class="nav-links">

<a href="/create">Create</a>
<a href="/profile">Profile</a>
<a href="/logout">Logout</a>

</div>

</div>

<div class="glass">

<form>

<input name="search" placeholder="Search posts">

</form>

</div>

{% for post in posts %}

<div class="glass">

<h3>{{post["title"]}}</h3>

<p>{{post["content"]}}</p>

<p>Subject: {{post["subject"]}}</p>

<p>By {{post["username"]}}</p>

<p>Likes: {{post["likes"]}}</p>

<a href="/like/{{post['id']}}">Like</a>

<a href="/post/{{post['id']}}">Discussion</a>

{% if post["image"] %}

<br><br>

<img src="/static/uploads/{{post['image']}}" width="250">

<br>

<a href="/static/uploads/{{post['image']}}" download>
Download Notes
</a>

{% endif %}

</div>

{% endfor %}
